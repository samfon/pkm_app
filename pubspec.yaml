name: pkm_app
description: "A Personal Knowledge Management App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0
  google_generative_ai: ^0.4.3
  flutter_downloader: ^1.11.6
  open_file: ^3.3.2
  package_info_plus: ^8.0.0
  dio: ^5.4.3
  http: ^1.2.1
  responsive_builder: ^0.7.1
  intl: ^0.19.0
  flutter_spinkit: ^5.2.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
